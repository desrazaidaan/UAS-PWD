<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NIGAKU</title>
  <link rel="icon" type="image/png" href="assets/Asset/NigakuIcon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barriecito&family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="checkout">
<main class="app-shell">
  <header class="top-nav" id="topNav">
  <a class="nav-brand logo-wordmark" href="index.html">NIGAKU</a>
  <nav class="nav-links" aria-label="Main navigation">
    <a href="index.html" data-i18n="navTicket">Tickets</a>
    <a href="merchandise.html" data-i18n="navMerchandise">Merch</a>
    <a href="gallery.html" data-i18n="navGallery">Gallery</a>
    <a href="about.html" data-i18n="navAbout">About Us</a>
  </nav>
  <button class="profile-button" id="profileButton" type="button" aria-label="Open profile">
    <img src="assets/Profile/IMG_7063.png" alt="Profile">
  </button>
</header>
  <section class="page app-page" id="checkoutPage">
    <article class="checkout-card">
      <div class="card-topline"><button class="text-button back-button" id="checkoutBackButton" type="button"><span class="back-icon" aria-hidden="true"></span></button><p class="eyebrow" data-i18n="checkoutEyebrow">Checkout</p></div>
      <h1 id="checkoutTitle">Checkout</h1>
      <div class="checkout-summary">
        <p><strong data-i18n="checkoutFestival">Festival</strong><span id="checkoutFestival"></span></p>
        <p><strong data-i18n="checkoutTicket">Ticket</strong><span id="checkoutTicket"></span></p>
        <label class="checkout-quantity"><strong data-i18n="checkoutQty">Quantity</strong><input id="checkoutQty" type="number" min="1" value="1"></label>
        <p><strong data-i18n="checkoutService">Service Fee</strong><span id="checkoutService"></span></p>
        <p><strong data-i18n="checkoutTotal">Total</strong><span id="checkoutTotal"></span></p>
        <p><strong data-i18n="checkoutBonus">Bonus</strong><span id="checkoutBonus"></span></p>
      </div>
      <div class="hotel-voucher hidden" id="hotelVoucher"><p class="eyebrow" data-i18n="hotelVoucher">Hotel Voucher</p><h2 id="hotelName">Hotel Name</h2><p id="hotelDesc"></p></div>
      <div class="checkout-actions"><button class="primary-button" id="checkoutPayButton" type="button" data-i18n="continuePayment">Continue to Payment</button></div>
    </article>
  </section>
</main>
<div class="toast hidden" id="toast"></div>
<script src="script.js"></script>
</body>
</html>
