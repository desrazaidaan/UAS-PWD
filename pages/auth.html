<main class="auth-screen" id="authScreen">
  <section class="auth-panel">
    <h1 class="auth-brand logo-wordmark">NIGAKU</h1>

    <div class="auth-tabs" role="tablist" aria-label="Authentication tabs">
      <button class="auth-tab active" id="signinTab" type="button">Sign In</button>
      <button class="auth-tab" id="signupTab" type="button">Sign Up</button>
    </div>

    <form class="auth-form active" id="signinForm">
      <label>
        Email
        <input type="email" id="signinEmail" value="kelompok3@gmail.com" required>
      </label>
      <label>
        Password
        <input type="password" id="signinPassword" value="12345678" required>
      </label>
      <p class="form-error" id="signinError"></p>
      <button class="primary-button" type="submit">Sign In</button>
    </form>

  <form class="auth-form" id="signupForm">
      <label>
        Username
        <input type="text" id="signupUsername" placeholder="Your name" required>
      </label>
      <label>
        Email
        <input type="email" id="signupEmail" placeholder="you@example.com" required>
      </label>
      <label>
        Password
        <input type="password" id="signupPassword" placeholder="Minimum 8 characters" required minlength="8">
      </label>
      <label>
        Phone Number <span>Optional</span>
        <input type="tel" id="signupPhone" placeholder="+62">
    </label>
    <button class="primary-button" type="submit">Create Account</button>
  </form>
  <form class="auth-form" id="resetForm">
    <label>
      Account Email
      <input type="email" id="resetEmail" placeholder="kelompok3@gmail.com" required>
    </label>
    <label>
      New Password
      <input type="password" id="resetPassword" placeholder="Minimum 8 characters" required minlength="8">
    </label>
    <label>
      Confirm Password
      <input type="password" id="resetConfirmPassword" placeholder="Repeat new password" required minlength="8">
    </label>
    <p class="form-error" id="resetError"></p>
    <button class="primary-button" type="submit">Reset Password</button>
    <button class="secondary-button" id="resetBackButton" type="button">Back to Sign In</button>
  </form>
  <footer class="page-footer auth-footer">
    <p>Copyright &copy; 2026 NIGAKU by Kelompok 3. All rights reserved.</p>
    <p>Next Interactive Gateway for Access to Konser Universe.</p>
    <p>This page is protected by Google security check to ensure you're not a bot.</p>
  </footer>
  </section>
</main>
