<section class="page app-page hidden" id="paymentMethodPage">
  <article class="checkout-card">
    <div class="card-topline">
      <button class="text-button back-button" id="paymentBackButton" type="button">
        <span class="back-icon" aria-hidden="true"></span>
      </button>
      <p class="eyebrow" data-i18n="paymentEyebrow">Payment Method</p>
    </div>
    <h1 data-i18n="paymentTitle">Choose a Payment Method</h1>
    <button class="payment-option" id="qrisOptionButton" type="button">
      <strong>QRIS</strong>
      <span data-i18n="qrisDesc">Scan and pay with any QRIS-supported app.</span>
    </button>
  </article>
</section>
