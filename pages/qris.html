<section class="page app-page hidden" id="qrisPage">

    <div class="card-topline">
      <button class="text-button back-button" id="qrisBackButton" type="button">
        <span class="back-icon" aria-hidden="true"></span>
      </button>
      <p class="eyebrow">QRIS</p>
    </div>
    <h1 data-i18n="scanQris">Scan QRIS</h1>
    <img src="assets/Tipe-QRIS-statis-small-large.jpg" alt="Dummy QRIS payment code">
    <p><span data-i18n="checkoutTotal">Total</span>: <strong id="qrisAmount"></strong></p>
    <button class="primary-button" id="checkPaymentButton" type="button" data-i18n="checkStatus">Check Status</button>
  </article>
</section>
