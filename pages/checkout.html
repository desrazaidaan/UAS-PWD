<section class="page app-page hidden" id="checkoutPage">
  <article class="checkout-card">
    <div class="card-topline">
      <button class="text-button back-button" id="checkoutBackButton" type="button">
        <span class="back-icon" aria-hidden="true"></span>
      </button>
      <p class="eyebrow" data-i18n="checkoutEyebrow">Checkout</p>
    </div>
    <h1 id="checkoutTitle">Checkout</h1>
    <div class="checkout-summary">
      <p><strong data-i18n="checkoutFestival">Festival</strong><span id="checkoutFestival"></span></p>
      <p><strong data-i18n="checkoutTicket">Ticket</strong><span id="checkoutTicket"></span></p>
      <label class="checkout-quantity">
        <strong data-i18n="checkoutQty">Quantity</strong>
        <input id="checkoutQty" type="number" min="1" value="1">
      </label>
      <p><strong data-i18n="checkoutService">Service Fee</strong><span id="checkoutService"></span></p>
      <p><strong data-i18n="checkoutTotal">Total</strong><span id="checkoutTotal"></span></p>
      <p><strong data-i18n="checkoutBonus">Bonus</strong><span id="checkoutBonus"></span></p>
    </div>
    <div class="hotel-voucher hidden" id="hotelVoucher">
      <p class="eyebrow" data-i18n="hotelVoucher">Hotel Voucher</p>
      <h2 id="hotelName">Hotel Name</h2>
      <p id="hotelDesc"></p>
    </div>
    <div class="checkout-actions">
      <button class="primary-button" id="checkoutPayButton" type="button">Continue to Payment</button>
    </div>
  </article>
</section>
