<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NIGAKU</title>
  <link rel="icon" type="image/png" href="assets/Asset/NigakuIcon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barriecito&family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="festival-detail">
<main class="app-shell">
  <header class="top-nav" id="topNav">
  <a class="nav-brand logo-wordmark" href="index.html">NIGAKU</a>
  <nav class="nav-links" aria-label="Main navigation">
    <a href="index.html" data-i18n="navTicket">Tickets</a>
    <a href="merchandise.html" data-i18n="navMerchandise">Merch</a>
    <a href="gallery.html" data-i18n="navGallery">Gallery</a>
    <a href="about.html" data-i18n="navAbout">About Us</a>
  </nav>
  <button class="profile-button" id="profileButton" type="button" aria-label="Open profile">
    <img src="assets/Profile/IMG_7063.png" alt="Profile">
  </button>
</header>
  <section class="page app-page" id="festivalDetailPage">
    <article class="festival-detail-page-card">
      <div class="card-topline">
        <button class="text-button back-button" id="backToTicketsButton" type="button"><span class="back-icon" aria-hidden="true"></span></button>
        <p class="eyebrow" id="detailGenre">Festival</p>
      </div>
      <div class="festival-detail-hero" id="detailHero">
        <h1 id="detailTitle">Festival Name</h1>
        <p id="detailSummary"></p>
      </div>
      <div class="festival-detail-list">
        <p><strong data-i18n="detailDate">Date</strong><span id="detailDateValue"></span></p>
        <p class="location-row"><strong data-i18n="detailLocation">Location</strong><span id="detailPlaceValue"></span><button class="map-button" id="detailMapButton" type="button" aria-label="Open location in Google Maps"><img src="assets/Asset/mapicon.png" alt=""></button></p>
        <p><strong data-i18n="detailLineup">Lineup</strong><span id="detailLineupValue"></span></p>
      </div>
      <div>
        <p class="eyebrow" data-i18n="ticketOptions">Ticket Options</p>
        <div class="ticket-option-list" id="ticketOptionList"></div>
      </div>
      <button class="secondary-button" id="detailOfficialButton" type="button">Official Website</button>
    </article>
  </section>
</main>
<div class="toast hidden" id="toast"></div>
<script src="script.js"></script>
</body>
</html>
